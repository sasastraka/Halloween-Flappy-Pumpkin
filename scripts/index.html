<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halloween Flappy Pumpkin</title>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Nosifer&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="uiContainer">
        <div id="scoreBoard">
            <div class="score-row"><span>Body:</span> <span id="currentScore">0</span></div>
            <div class="score-row highlight"><span>Rekord:</span> <span id="highScore">0</span></div>
        </div>
        <button id="muteBtn" onclick="toggleMute()">🔊</button>
    </div>

    <div id="pauseMenu" style="display: none;">
        <h1 class="creep-text">PAUZA</h1>
        <p>Stiskni ESC pro pokračování</p>
    </div>

    <div id="gameOverScreen" style="display: none;">
        <h1 class="bloody-text">KONEC HRY</h1>
        <p id="finalStats"></p>
        <p class="blink">Mezerník nebo Levé tlačítko pro restart</p>
    </div>

    <canvas id="gameCanvas"></canvas>
    <script src="script.js"></script>
</body>
</html>
